# Blueprint para desplegar en Render con un solo click.
# https://render.com/docs/blueprint-spec
#
# Runtime: Docker. La imagen base (mcr.microsoft.com/playwright/python) trae
# Chromium + libs del sistema ya instalados. Esto evita el problema del native
# Python runtime de Render que NO permite sudo apt-get y por ende NO puede
# correr `playwright install --with-deps`.
#
# Uso:
# 1. Push del repo a GitHub.
# 2. En Render: New → Blueprint → conectar el repo.
# 3. Render lee este archivo y crea el servicio web (Docker).
# 4. Antes del primer deploy, configurar manualmente en el dashboard:
#    DATABASE_URL (cadena de Neon, secreta), JWT_SECRET_KEY y CORS_ORIGINS.
#    Para las fotos del marketplace (M2), también: CLOUDINARY_CLOUD_NAME,
#    CLOUDINARY_API_KEY y CLOUDINARY_API_SECRET (van como sync:false, no se commitean).
#
# La BD es externa (Neon, PostgreSQL 16+). No se provisiona Postgres en Render
# (el plan free expira a 90 días). La DATABASE_URL es secreta → sync: false,
# nunca se commitea aquí.

services:
  - type: web
    name: consulta-placas-ec
    runtime: docker
    plan: free
    region: oregon
    branch: main
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        sync: false   # cadena de conexión a Neon. Configurar en el dashboard (secreta).
      - key: JWT_SECRET_KEY
        sync: false   # configurar manualmente en el dashboard (más seguro)
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRA_MINUTOS
        value: "1440"
      - key: CACHE_TTL_MINUTOS
        value: "30"   # fallback para fuentes sin clasificar
      - key: CACHE_TTL_TRANSACCIONAL_MINUTOS
        value: "720"     # 12h — multas/infracciones/denuncias/valores (datos que cambian)
      - key: CACHE_TTL_ESTATICO_MINUTOS
        value: "129600"  # 90 días — características del vehículo (reservado para el TO-BE)
      - key: CORS_ORIGINS
        sync: false   # configurar con la URL del frontend Next.js cuando exista
      - key: ADMIN_EMAILS
        sync: false   # lista separada por comas; modera referencias del marketplace
      # Cloudinary (M2 fotos): subida firmada desde el navegador; el backend solo firma.
      # Los tres van en el dashboard (repo público → no se commitean, ni siquiera cloud/api_key).
      # Sin ellos, POST /marketplace/publicaciones/{id}/fotos/firma responde 503.
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false   # SECRETO — nunca en el repo
      - key: CLOUDINARY_UPLOAD_FOLDER
        value: revisa-carro-ec/publicaciones
