# Blueprint para desplegar en Render con un solo click.
# https://render.com/docs/blueprint-spec
#
# Runtime: Docker. La imagen base (mcr.microsoft.com/playwright/python) trae
# Chromium + libs del sistema ya instalados. Esto evita el problema del native
# Python runtime de Render que NO permite sudo apt-get y por ende NO puede
# correr `playwright install --with-deps`.
#
# Uso:
# 1. Push del repo a GitHub.
# 2. En Render: New → Blueprint → conectar el repo.
# 3. Render lee este archivo y crea el servicio web (Docker).
# 4. Antes del primer deploy, configurar manualmente en el dashboard:
#    DATABASE_URL (cadena de Neon, secreta), JWT_SECRET_KEY y CORS_ORIGINS.
#
# La BD es externa (Neon, PostgreSQL 16+). No se provisiona Postgres en Render
# (el plan free expira a 90 días). La DATABASE_URL es secreta → sync: false,
# nunca se commitea aquí.

services:
  - type: web
    name: consulta-placas-ec
    runtime: docker
    plan: free
    region: oregon
    branch: main
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        sync: false   # cadena de conexión a Neon. Configurar en el dashboard (secreta).
      - key: JWT_SECRET_KEY
        sync: false   # configurar manualmente en el dashboard (más seguro)
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRA_MINUTOS
        value: "1440"
      - key: CACHE_TTL_MINUTOS
        value: "30"
      - key: CORS_ORIGINS
        sync: false   # configurar con la URL del frontend Next.js cuando exista
