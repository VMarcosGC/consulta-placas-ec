# Blueprint para desplegar en Render con un solo click.
# https://render.com/docs/blueprint-spec
#
# Uso:
# 1. Push del repo a GitHub.
# 2. En Render: New → Blueprint → conectar el repo.
# 3. Render lee este archivo y crea el servicio web + base de datos.
# 4. Antes del primer deploy: agregar a Environment las variables marcadas como `sync: false` abajo (JWT_SECRET_KEY).

services:
  - type: web
    name: consulta-placas-ec
    runtime: python
    plan: free
    region: oregon
    branch: main
    buildCommand: "./build.sh"
    startCommand: "alembic upgrade head && python run.py"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: consulta-placas-db
          property: connectionString
      - key: JWT_SECRET_KEY
        sync: false   # configurar manualmente en el dashboard (más seguro)
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRA_MINUTOS
        value: 1440
      - key: CACHE_TTL_MINUTOS
        value: 30
      - key: CORS_ORIGINS
        sync: false   # configurar con la URL del frontend Next.js cuando exista

databases:
  - name: consulta-placas-db
    plan: free
    region: oregon
    postgresMajorVersion: 16
